<!DOCTYPE html>
<html lang="vi" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Tất cả sản phẩm lụa tơ tằm Mã Châu - Làng nghề truyền thống hơn 600 năm">
    <title>Sản Phẩm - Lụa Mã Châu</title>
    <link rel="icon" href="images/logo.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* === PRODUCTS PAGE SPECIFIC === */
        .products-page {
            padding-top: calc(var(--header-h) + 40px);
            min-height: 100vh;
        }

        .products-hero {
            text-align: center;
            padding: 40px 0 30px;
        }

        .products-hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(28px, 4vw, 42px);
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .products-hero p {
            color: var(--text-secondary);
            font-size: 16px;
        }

        .products-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 32px;
            padding: 16px 20px;
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
        }

        .products-toolbar .filters {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .filter-chip {
            padding: 8px 18px;
            font-size: 13px;
            font-weight: 500;
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-full);
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
        }

        .filter-chip:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        .filter-chip.active {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border-color: var(--gold);
            color: white;
        }

        .products-search {
            position: relative;
            min-width: 250px;
        }

        .products-search input {
            width: 100%;
            padding: 10px 16px 10px 40px;
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-full);
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: var(--transition);
        }

        .products-search input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px var(--gold-bg);
        }

        .products-search i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-tertiary);
            font-size: 14px;
        }

        .sort-select {
            padding: 10px 16px;
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-full);
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 13px;
            outline: none;
            cursor: pointer;
        }

        .product-count {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        .product-count strong {
            color: var(--gold);
        }

        /* Dynamic Product Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 24px;
            margin-bottom: 48px;
        }

        .p-card {
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            overflow: hidden;
            transition: var(--transition);
        }

        .p-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-lg);
            border-color: var(--gold-light);
        }

        .p-card-img {
            position: relative;
            aspect-ratio: 1;
            overflow: hidden;
            background: var(--bg-tertiary);
        }

        .p-card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .p-card:hover .p-card-img img {
            transform: scale(1.08);
        }

        .p-card-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            padding: 4px 12px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.5px;
            border-radius: var(--radius-full);
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: white;
            text-transform: uppercase;
        }

        .p-card-badge.new { background: linear-gradient(135deg, #2E7D32, #1B5E20); }
        .p-card-badge.exclusive { background: linear-gradient(135deg, var(--accent), var(--accent-light)); }

        .p-card-actions {
            position: absolute;
            bottom: 12px;
            right: 12px;
            display: flex;
            gap: 8px;
            opacity: 0;
            transform: translateY(10px);
            transition: var(--transition);
        }

        .p-card:hover .p-card-actions {
            opacity: 1;
            transform: none;
        }

        .p-card-actions button {
            width: 38px;
            height: 38px;
            background: var(--bg-glass-strong);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 50%;
            color: var(--text-primary);
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
        }

        .p-card-actions button:hover {
            background: var(--gold);
            color: white;
            border-color: var(--gold);
        }

        .p-card-body {
            padding: 16px;
        }

        .p-card-cat {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--gold);
            margin-bottom: 6px;
            display: block;
        }

        .p-card-body h3 {
            font-size: 15px;
            font-weight: 600;
            line-height: 1.3;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .p-card-sku {
            font-size: 12px;
            color: var(--text-tertiary);
            margin-bottom: 10px;
        }

        .p-card-price {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .p-card-price .price {
            font-size: 17px;
            font-weight: 700;
            color: var(--accent);
        }

        .p-card-price .old {
            font-size: 13px;
            color: var(--text-tertiary);
            text-decoration: line-through;
        }

        .p-card-stock {
            font-size: 12px;
            margin-top: 8px;
            color: var(--text-tertiary);
        }

        .p-card-stock.low {
            color: var(--accent);
            font-weight: 600;
        }

        /* Pagination */
        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 32px 0 64px;
        }

        .page-btn {
            width: 40px;
            height: 40px;
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-sm);
            background: var(--bg-secondary);
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
        }

        .page-btn:hover { border-color: var(--gold); color: var(--gold); }
        .page-btn.active {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: white;
            border-color: var(--gold);
        }
        .page-btn:disabled { opacity: 0.4; cursor: default; }

        /* Loading */
        .products-loading {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-tertiary);
        }

        .products-loading i {
            font-size: 32px;
            color: var(--gold);
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
            display: block;
        }

        .products-empty {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-secondary);
        }

        .products-empty i {
            font-size: 48px;
            color: var(--text-tertiary);
            margin-bottom: 16px;
        }

        @media (max-width: 768px) {
            .products-toolbar {
                flex-direction: column;
                align-items: stretch;
            }
            .products-search { min-width: unset; }
            .products-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }
            .p-card-body { padding: 12px; }
            .p-card-body h3 { font-size: 13px; }
        }
    </style>
</head>

<body>
    <!-- ===== HEADER ===== -->
    <header class="header scrolled" id="header">
        <div class="header-container">
            <a href="index.html" class="logo" aria-label="Trang chủ">
                <img src="images/logo.jpg" alt="Ma Chau Silk Logo" class="logo-img"
                    style="height: 50px; width: auto; object-fit: contain;">
            </a>
            <nav class="nav-desktop">
                <a href="index.html" class="nav-link">Trang chủ</a>
                <a href="index.html#about" class="nav-link">Giới thiệu</a>
                <a href="products.html" class="nav-link active">Sản phẩm</a>
                <a href="index.html#village" class="nav-link">Làng nghề</a>
                <a href="index.html#contact" class="nav-link">Liên hệ</a>
            </nav>
            <div class="header-actions">
                <button class="icon-btn theme-toggle" id="theme-toggle" aria-label="Chế độ tối">
                    <i class="fas fa-moon"></i>
                </button>
                <a href="tel:0848543171" class="hotline-btn">
                    <i class="fas fa-phone-volume"></i>
                    <span>0848.543.171</span>
                </a>
            </div>
        </div>
    </header>

    <!-- ===== PRODUCTS PAGE ===== -->
    <main class="products-page">
        <div class="container">
            <div class="products-hero">
                <h1>Bộ Sưu Tập Lụa Mã Châu</h1>
                <p>Khám phá toàn bộ sản phẩm lụa tơ tằm từ làng nghề truyền thống hơn 600 năm</p>
            </div>

            <div class="products-toolbar">
                <div class="filters" id="category-filters">
                    <button class="filter-chip active" data-cat="">Tất cả</button>
                </div>
                <div class="products-search">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search-input" placeholder="Tìm kiếm sản phẩm...">
                </div>
                <select class="sort-select" id="sort-select">
                    <option value="">Mới nhất</option>
                    <option value="price_asc">Giá thấp → cao</option>
                    <option value="price_desc">Giá cao → thấp</option>
                    <option value="name_asc">A → Z</option>
                </select>
            </div>

            <p class="product-count" id="product-count"></p>

            <div class="products-grid" id="products-grid">
                <div class="products-loading">
                    <i class="fas fa-spinner"></i>
                    <p>Đang tải sản phẩm...</p>
                </div>
            </div>

            <div class="pagination" id="pagination"></div>
        </div>
    </main>

    <!-- ===== FOOTER ===== -->
    <footer class="footer">
        <div class="footer-bottom">
            <div class="container footer-bottom-inner">
                <p>© 2024 Lụa Mã Châu. Tất cả quyền được bảo lưu.</p>
                <div class="payment-methods">
                    <i class="fab fa-cc-visa"></i>
                    <i class="fab fa-cc-mastercard"></i>
                    <i class="fas fa-money-bill-wave"></i>
                    <i class="fas fa-qrcode"></i>
                </div>
            </div>
        </div>
    </footer>

    <script>
        const API = '/api';
        let currentPage = 1;
        let currentCategory = '';
        let currentSearch = '';
        let currentSort = '';
        let debounceTimer;

        // Theme toggle
        const savedTheme = localStorage.getItem('machau-theme') || 'light';
        document.documentElement.dataset.theme = savedTheme;
        document.getElementById('theme-toggle').addEventListener('click', () => {
            const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
            document.documentElement.dataset.theme = next;
            localStorage.setItem('machau-theme', next);
        });

        // Escape HTML (chống XSS)
        function esc(str) {
            const d = document.createElement('div');
            d.textContent = str || '';
            return d.innerHTML;
        }

        // Load categories
        async function loadCategories() {
            try {
                const res = await fetch(`${API}/categories`);
                const cats = await res.json();
                const container = document.getElementById('category-filters');
                cats.forEach(c => {
                    const btn = document.createElement('button');
                    btn.className = 'filter-chip';
                    btn.dataset.cat = c.slug;
                    btn.textContent = c.name;
                    container.appendChild(btn);
                });
                container.addEventListener('click', e => {
                    if (e.target.classList.contains('filter-chip')) {
                        container.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
                        e.target.classList.add('active');
                        currentCategory = e.target.dataset.cat;
                        currentPage = 1;
                        loadProducts();
                    }
                });
            } catch (e) { console.error(e); }
        }

        // Load products
        async function loadProducts() {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '<div class="products-loading"><i class="fas fa-spinner"></i><p>Đang tải...</p></div>';

            const params = new URLSearchParams({ page: currentPage, limit: 12 });
            if (currentCategory) params.set('category', currentCategory);
            if (currentSearch) params.set('search', currentSearch);
            if (currentSort) params.set('sort', currentSort);

            try {
                const res = await fetch(`${API}/products?${params}`);
                const data = await res.json();
                const products = data.products || data;
                const total = data.total || products.length;
                const totalPages = data.totalPages || 1;

                document.getElementById('product-count').innerHTML =
                    `Hiển thị <strong>${products.length}</strong> / <strong>${total}</strong> sản phẩm`;

                if (products.length === 0) {
                    grid.innerHTML = `<div class="products-empty" style="grid-column:1/-1">
                        <i class="fas fa-box-open"></i>
                        <p>Không tìm thấy sản phẩm phù hợp</p>
                    </div>`;
                    document.getElementById('pagination').innerHTML = '';
                    return;
                }

                grid.innerHTML = products.map(p => {
                    const badgeMap = { bestseller: 'Bán chạy', new: 'Mới', exclusive: 'Độc quyền' };
                    const badgeClass = p.badge === 'new' ? 'new' : p.badge === 'exclusive' ? 'exclusive' : '';
                    const badgeHtml = p.badge ? `<span class="p-card-badge ${badgeClass}">${badgeMap[p.badge] || p.badge}</span>` : '';
                    const img = p.primary_image || 'images/logo.jpg';
                    const stockHtml = p.stock_qty <= 5
                        ? `<p class="p-card-stock low"><i class="fas fa-exclamation-circle"></i> Chỉ còn ${p.stock_qty} sản phẩm</p>`
                        : `<p class="p-card-stock">Còn ${p.stock_qty} sản phẩm</p>`;
                    const oldPrice = p.original_price && p.original_price > p.price
                        ? `<span class="old">${Number(p.original_price).toLocaleString('vi-VN')}đ</span>` : '';

                    return `<div class="p-card">
                        <div class="p-card-img">
                            <img src="${esc(img)}" alt="${esc(p.name)}" loading="lazy">
                            ${badgeHtml}
                            <div class="p-card-actions">
                                <button title="Thêm giỏ hàng" onclick="addToCart(${p.id})"><i class="fas fa-shopping-bag"></i></button>
                                <button title="Yêu thích"><i class="fas fa-heart"></i></button>
                            </div>
                        </div>
                        <div class="p-card-body">
                            <span class="p-card-cat">${esc(p.category_name || '')}</span>
                            <h3>${esc(p.name)}</h3>
                            <p class="p-card-sku">${esc(p.sku || '')}</p>
                            <div class="p-card-price">
                                <span class="price">${Number(p.price).toLocaleString('vi-VN')}đ</span>
                                ${oldPrice}
                            </div>
                            ${stockHtml}
                        </div>
                    </div>`;
                }).join('');

                // Pagination
                renderPagination(currentPage, totalPages);
            } catch (e) {
                console.error(e);
                grid.innerHTML = '<div class="products-empty" style="grid-column:1/-1"><i class="fas fa-exclamation-triangle"></i><p>Lỗi tải sản phẩm</p></div>';
            }
        }

        function renderPagination(page, totalPages) {
            const el = document.getElementById('pagination');
            if (totalPages <= 1) { el.innerHTML = ''; return; }
            let html = `<button class="page-btn" onclick="goPage(${page - 1})" ${page <= 1 ? 'disabled' : ''}><i class="fas fa-chevron-left"></i></button>`;
            for (let i = 1; i <= totalPages; i++) {
                html += `<button class="page-btn ${i === page ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
            }
            html += `<button class="page-btn" onclick="goPage(${page + 1})" ${page >= totalPages ? 'disabled' : ''}><i class="fas fa-chevron-right"></i></button>`;
            el.innerHTML = html;
        }

        function goPage(p) { currentPage = p; loadProducts(); window.scrollTo({ top: 0, behavior: 'smooth' }); }

        function addToCart(productId) {
            alert('Vui lòng đăng nhập để thêm sản phẩm vào giỏ hàng');
        }

        // Search
        document.getElementById('search-input').addEventListener('input', e => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                currentSearch = e.target.value.trim();
                currentPage = 1;
                loadProducts();
            }, 400);
        });

        // Sort
        document.getElementById('sort-select').addEventListener('change', e => {
            currentSort = e.target.value;
            currentPage = 1;
            loadProducts();
        });

        // Init
        loadCategories();
        loadProducts();
    </script>
</body>
</html>
